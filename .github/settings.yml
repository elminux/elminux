# GitHub Repository Settings
# This file configures branch protection and repository settings
# Requires the "Probot Settings" GitHub App or manual admin configuration

repository:
  name: elminux
  description: An experimental operating system for sovereignty, sovereignty-adjacent education, and real-world deployment — from medical devices to agricultural sensors.
  homepage: https://elminux.org
  topics: os, kernel, rust, operating-system, microkernel, capability-based, sovereign-tech
  has_issues: true
  has_projects: true
  has_wiki: false
  has_downloads: true
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: true
  delete_branch_on_merge: true

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
      required_status_checks:
        strict: true
        contexts:
          - build
          - clippy
          - test
      enforce_admins: false
      restrictions:
        users: []
        teams: []
      required_linear_history: false
      allow_force_pushes: false
      allow_deletions: false

  - name: dev
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: false
        require_code_owner_reviews: false
      required_status_checks:
        strict: false
        contexts:
          - build
          - clippy
      enforce_admins: false
      restrictions:
        users: []
        teams: []
      required_linear_history: false
      allow_force_pushes: false
      allow_deletions: false
