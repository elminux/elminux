name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always

jobs:
  # 3.1 Build + clippy on every PR
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview, rustfmt, clippy
          targets: x86_64-unknown-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build kernel
        run: cargo build --package elminux-kernel

      - name: Clippy
        run: cargo clippy --package elminux-kernel -- -D warnings

      - name: Format check
        run: cargo fmt --check

  # 3.3 Doc build verification
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build docs
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  # 3.4 License + advisory check (cargo-deny)
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check all

  # 3.2 QEMU boot smoke test (headless)
  qemu-smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-none

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 xorriso lld llvm

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build ISO
        run: make iso

      - name: QEMU smoke test (5s timeout)
        run: |
          timeout 5s qemu-system-x86_64 \
            -cdrom build/elminux.iso \
            -m 256M \
            -nographic \
            -no-reboot \
            -monitor none \
            -serial stdio \
            || exit_code=$?
          # Exit code 124 means timeout (expected), 0 means clean exit
          if [ "${exit_code:-0}" -eq 124 ]; then
            echo "QEMU smoke test passed (ran for 5s without crash)"
            exit 0
          elif [ "${exit_code:-0}" -eq 0 ]; then
            echo "QEMU exited cleanly"
            exit 0
          else
            echo "QEMU crashed or exited unexpectedly (exit code: ${exit_code:-0})"
            exit 1
          fi
