# Elminux pre-commit configuration
# See https://pre-commit.com for details

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: \.(md|txt)$
      - id: end-of-file-fixer
        exclude: \.(md|txt)$
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: check-case-conflict

  # Rust formatting
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        args: ['--all']
        pass_filenames: false

  # Rust clippy (local hook for workspace exclude support)
  - repo: local
    hooks:
      - id: clippy-workspace
        name: cargo clippy workspace
        entry: cargo clippy --workspace --exclude build-tools -- -D warnings -A static_mut_refs
        language: system
        pass_filenames: false
        types: [rust]

  # Cargo check - kernel and userland (no_std target)
  - repo: local
    hooks:
      - id: cargo-check-workspace
        name: cargo check workspace
        entry: cargo check --workspace --exclude build-tools
        language: system
        pass_filenames: false
        types: [rust]

  # Cargo check - host build tools (std target)
  - repo: local
    hooks:
      - id: cargo-check-host-tools
        name: cargo check host tools
        entry: bash -c "cd tools/build-tools && cargo check"
        language: system
        pass_filenames: false
        files: ^tools/
        types: [rust]

  # Deny license/advisory check (if cargo-deny installed)
  - repo: local
    hooks:
      - id: cargo-deny
        name: cargo deny check
        entry: cargo deny check
        language: system
        pass_filenames: false
        files: Cargo\.(toml|lock)$
        # Only run if cargo-deny is installed
        stages: [manual]
